kind = "mobile"
previewPath = "/"
title = "Skyline Group Mobile App"
version = "1.0.0"
id = "artifacts/skyline-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18911

[services.development]
run = "pnpm --filter @workspace/skyline-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skyline-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/skyline-mobile", "run", "serve" ]

[services.env]
PORT = "18911"
BASE_PATH = "/"
